name: ci

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - run: npm run lint

    format:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - run: npm run format:check

    typecheck:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - run: npm run typecheck

    build-core:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - run: npm run build
            - uses: actions/upload-artifact@v4
              with:
                  name: core-build
                  path: dist/
                  retention-days: 1
                  if-no-files-found: error

    typecheck-packages:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build-core

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - uses: actions/download-artifact@v4
              with:
                  name: core-build
                  path: dist/
            - run: npm run typecheck:packages

    test-core:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build-core

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - uses: actions/download-artifact@v4
              with:
                  name: core-build
                  path: dist/
            - run: npm test

    test-fake-server:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build-core

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - uses: actions/download-artifact@v4
              with:
                  name: core-build
                  path: dist/
            - run: npx turbo run build --filter=@zapo-js/fake-server
            - run: npm test -w packages/fake-server

    test-media-utils:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build-core

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - uses: actions/download-artifact@v4
              with:
                  name: core-build
                  path: dist/

            - name: install ffmpeg and ffprobe
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ffmpeg

            - run: npx turbo run build --filter=@zapo-js/media-utils
            - run: npm test -w packages/media-utils

    test-sqlite:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build-core

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - uses: actions/download-artifact@v4
              with:
                  name: core-build
                  path: dist/
            - run: npx turbo run build --filter=@zapo-js/store-sqlite
            - run: npm test -w packages/store-sqlite

    test-mcp-server:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build-core

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - uses: actions/download-artifact@v4
              with:
                  name: core-build
                  path: dist/
            - run: npx turbo run build --filter=@zapo-js/fake-server --filter=@zapo-js/store-sqlite --filter=@zapo-js/media-utils --filter=@zapo-js/mcp-server
            - run: npm test -w packages/mcp-server

    test-mysql:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build-core

        services:
            mysql:
                image: mysql:8
                env:
                    MYSQL_ROOT_PASSWORD: test
                    MYSQL_DATABASE: zapo_test
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping -h localhost -u root -ptest"
                    --health-interval=3s
                    --health-retries=10

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - uses: actions/download-artifact@v4
              with:
                  name: core-build
                  path: dist/
            - run: npx turbo run build --filter=@zapo-js/store-mysql
            - run: npm test -w packages/store-mysql
              env:
                  ZAPO_TEST_MYSQL_HOST: localhost
                  ZAPO_TEST_MYSQL_PORT: '3306'
                  ZAPO_TEST_MYSQL_USER: root
                  ZAPO_TEST_MYSQL_PASSWORD: test
                  ZAPO_TEST_MYSQL_DATABASE: zapo_test

    test-postgres:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build-core

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_PASSWORD: test
                    POSTGRES_DB: zapo_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U postgres"
                    --health-interval=3s
                    --health-retries=10

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - uses: actions/download-artifact@v4
              with:
                  name: core-build
                  path: dist/
            - run: npx turbo run build --filter=@zapo-js/store-postgres
            - run: npm test -w packages/store-postgres
              env:
                  ZAPO_TEST_PG_HOST: localhost
                  ZAPO_TEST_PG_PORT: '5432'
                  ZAPO_TEST_PG_USER: postgres
                  ZAPO_TEST_PG_PASSWORD: test
                  ZAPO_TEST_PG_DATABASE: zapo_test

    test-redis:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build-core

        services:
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd="redis-cli ping"
                    --health-interval=3s
                    --health-retries=10

        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - uses: actions/download-artifact@v4
              with:
                  name: core-build
                  path: dist/
            - run: npx turbo run build --filter=@zapo-js/store-redis
            - run: npm test -w packages/store-redis
              env:
                  ZAPO_TEST_REDIS_HOST: localhost
                  ZAPO_TEST_REDIS_PORT: '6379'

    test-mongo:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: build-core

        steps:
            - name: start mongo replica set
              run: |
                  docker run -d --name mongo -p 27017:27017 mongo:7 mongod --replSet rs0
                  until docker exec mongo mongosh --eval "rs.initiate()" --quiet 2>/dev/null; do
                    sleep 1
                  done

            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-node
            - uses: actions/download-artifact@v4
              with:
                  name: core-build
                  path: dist/
            - run: npx turbo run build --filter=@zapo-js/store-mongo
            - run: npm test -w packages/store-mongo
              env:
                  ZAPO_TEST_MONGO_HOST: localhost
                  ZAPO_TEST_MONGO_PORT: '27017'

    all-checks:
        name: all checks
        if: always()
        runs-on: ubuntu-latest
        timeout-minutes: 1
        needs:
            - lint
            - format
            - typecheck
            - build-core
            - typecheck-packages
            - test-core
            - test-fake-server
            - test-media-utils
            - test-sqlite
            - test-mcp-server
            - test-mysql
            - test-postgres
            - test-redis
            - test-mongo

        steps:
            - name: verify all needs succeeded
              if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
              run: exit 1
            - run: echo "all checks passed"
