name: Publish @wppconnect/zapo

# Publishes the ROOT package of this fork to npm as @wppconnect/zapo via OIDC
# trusted publishing.
#
# NOTE: zapo is a monorepo (workspaces: packages/*). Only the root client
# package is published here (as @wppconnect/zapo) with --workspaces=false; the
# sub-packages are not republished.
#
# WHY A `publish` BRANCH:
# The default branch (master) stays a faithful mirror of upstream (vinikjkkj/
# zapo) so rebasing/syncing is conflict-free. This `publish` branch is the ONLY
# place package.json carries the scoped name + the fork's repository url — which
# OIDC provenance REQUIRES to match the GitHub repo.
#
# Auth: OIDC trusted publishing. No long-lived NPM_TOKEN secret is required.

on:
  push:
    branches:
      - publish
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (publish branch)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build (root package)
        run: npm run build

      - name: Publish root package to npm
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already published, skipping."
          else
            npm publish --workspaces=false --access public
          fi
