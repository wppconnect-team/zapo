name: Publish @wppconnect/zapo

# Publishes the ROOT package of this fork to npm as @wppconnect/zapo.
#
# NOTE: zapo is a monorepo (workspaces: packages/*). This workflow publishes
# only the root client package (upstream name "zapo-js") under the scoped name
# @wppconnect/zapo — that is what wppconnect-server consumes. The workspace
# sub-packages (store-*, media-utils, ...) are NOT republished here; decide on
# those separately if/when needed.
#
# The fork's package.json keeps the upstream name so the branch stays a faithful
# mirror. The scoped name is applied ONLY here in the runner, right before
# publishing — never committed.
#
# Trigger: push a tag like `wpp-v0.3.0` (own prefix, never collides with the
# upstream's tags).
#
# Auth: OIDC trusted publishing (same model as wppconnect-team/wppconnect).
# Configure a trusted publisher for @wppconnect/zapo in npm pointing at this
# workflow. No NPM_TOKEN secret needed.

on:
    push:
        tags:
            - 'wpp-v*'

permissions:
    id-token: write
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: npm ci || npm install

            - name: Build (root package)
              run: npm run build

            - name: Apply @wppconnect scope (runner only, not committed)
              run: |
                  VERSION="${GITHUB_REF_NAME#wpp-v}"
                  npm pkg set name='@wppconnect/zapo'
                  npm pkg set version="${VERSION}"
                  npm pkg set 'publishConfig.access'='public'
                  echo "Publishing @wppconnect/zapo@${VERSION} (root package only)"

            - name: Publish root package to npm
              run: |
                  if [[ "${GITHUB_REF_NAME}" == *"-alpha"* || "${GITHUB_REF_NAME}" == *"-rc"* || "${GITHUB_REF_NAME}" == *"-beta"* ]]; then
                    npm publish --provenance --access public --tag next --workspaces=false
                  else
                    npm publish --provenance --access public --workspaces=false
                  fi
